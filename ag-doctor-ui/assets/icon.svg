<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g filter="url(#glow)">
    <path d="M256 64 L416 144 L416 320 L256 416 L96 320 L96 144 Z"
          fill="none" stroke="url(#accent)" stroke-width="14" stroke-linejoin="round"/>
    <circle cx="256" cy="240" r="56" fill="url(#accent)"/>
  </g>
  <g stroke="url(#accent)" stroke-width="10" stroke-linecap="round" opacity="0.9">
    <line x1="256" y1="120" x2="256" y2="160"/>
    <line x1="256" y1="320" x2="256" y2="360"/>
    <line x1="120" y1="240" x2="160" y2="240"/>
    <line x1="352" y1="240" x2="392" y2="240"/>
  </g>
</svg>
